<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha de equipo | Interclases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Poppins, Arial, sans-serif; color: #273c5b; background: #f4f7f6; }
    header { padding: 28px 20px; color: #fff; background: linear-gradient(135deg, #1e3c72, #2a5298); }
    .contenido { width: min(980px, calc(100% - 40px)); margin: 32px auto 56px; }
    .volver { display: inline-block; margin-bottom: 22px; color: #1e3c72; font-weight: 600; text-decoration: none; }
    .perfil { display: flex; align-items: center; gap: 24px; padding: 30px; border-radius: 14px; color: #fff; background: linear-gradient(135deg, #1e3c72, #367bc1); box-shadow: 0 8px 20px rgba(17,58,108,.16); }
    .bandera { width: 105px; height: 105px; flex: 0 0 105px; display: block; object-fit: cover; border-radius: 50%; border: 4px solid rgba(255,255,255,.7); background: #fff; }
    .icono { display: grid; place-items: center; width: 105px; height: 105px; flex: 0 0 105px; border-radius: 50%; font-size: 4rem; background: #fff; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3rem); }
    .perfil p { margin: 5px 0 0; opacity: .92; font-size: 1.1rem; }
    .rejilla { display: grid; grid-template-columns: repeat(auto-fit, minmax(245px, 1fr)); gap: 20px; margin-top: 24px; }
    section { min-height: 180px; padding: 25px; border-radius: 12px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,.05); }
    h2 { margin: 0 0 12px; color: #1e3c72; font-size: 1.25rem; }
    .nota { color: #65758a; line-height: 1.65; }
    .espacio { height: 80px; margin-top: 16px; border: 2px dashed #cdd9e7; border-radius: 8px; background: #f9fbfd; }
    .galeria-fotos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
    .galeria-fotos img { width: 100%; height: 92px; display: block; object-fit: cover; border-radius: 7px; }
    .galeria-fotos img:first-child { grid-column: span 2; height: 190px; grid-row: span 2; }
    .galeria-fotos img { cursor: zoom-in; }
    .visor { position: fixed; inset: 0; z-index: 10; display: none; align-items: center; justify-content: center; padding: 24px; background: rgba(5, 16, 32, .88); }
    .visor.activo { display: flex; }
    .visor img { max-width: min(1100px, 88vw); max-height: 82vh; border-radius: 8px; box-shadow: 0 12px 35px rgba(0,0,0,.45); object-fit: contain; }
    .visor button { position: absolute; border: 0; color: #fff; cursor: pointer; font: inherit; }
    .cerrar { top: 16px; right: 22px; width: 42px; height: 42px; border-radius: 50%; font-size: 2rem; background: rgba(255,255,255,.18); }
    .anterior, .siguiente { top: 50%; transform: translateY(-50%); width: 46px; height: 66px; border-radius: 8px; font-size: 2.4rem; background: rgba(255,255,255,.18); }
    .anterior { left: 18px; } .siguiente { right: 18px; }
    footer { padding: 20px; text-align: center; color: #718096; }
    @media (max-width: 560px) { .perfil { align-items: flex-start; padding: 22px; } .bandera, .icono { width: 76px; height: 76px; flex-basis: 76px; font-size: 2.8rem; } }
  </style>
</head>
<body>
  <header><strong>Equipos Interclases</strong></header>
  <main class="contenido">
    <a class="volver" href="equipos-interclases.html">← Volver a todos los equipos</a>
    <article class="perfil"><img id="bandera" class="bandera" alt="Bandera del equipo"><div><h1 id="titulo">Equipo</h1><p id="subtitulo">Borrador de ficha del equipo</p></div></article>
    <div class="rejilla">
      <section><h2>Integrantes</h2><p class="nota">Próximamente se agregará la lista de estudiantes y docentes responsables.</p><div class="espacio"></div></section>
      <section><h2>Galería</h2><div id="galeria-contenido"><p class="nota">Reserva este espacio para fotos de partidos, entrenamientos y celebraciones.</p><div class="espacio"></div></div></section>
    </div>
  </main>
  <footer>© 2026 Deportes Institucionales</footer>
  <div class="visor" id="visor" role="dialog" aria-modal="true" aria-label="Vista ampliada de la galería">
    <button class="cerrar" id="cerrar-visor" aria-label="Cerrar">×</button>
    <button class="anterior" id="foto-anterior" aria-label="Foto anterior">‹</button>
    <img id="foto-ampliada" alt="">
    <button class="siguiente" id="foto-siguiente" aria-label="Foto siguiente">›</button>
  </div>
  <script>
    const equipos = {
      '5:1': ['Alemania', 'de'], '5:2': ['España', 'es'], '5:3': ['Países Bajos', 'nl'],
      '6:1': ['Colombia', 'co'], '6:2': ['Senegal', 'sn'], '6:3': ['Francia', 'fr'], '6:4': ['Estados Unidos', 'us'],
      '7:1': ['Inglaterra', 'gb-eng'], '7:2': ['Uruguay', 'uy'], '7:3': ['Noruega', 'no'],
      '8:1': ['México', 'mx'], '8:2': ['Japón', 'jp'], '8:3': ['Croacia', 'hr'],
      '9:1': ['Suiza', 'ch'], '9:2': ['Bélgica', 'be'], '9:3': ['Italia', 'it'],
      '10:1': ['Ecuador', 'ec'], '10:2': ['Argentina', 'ar'], '10:3': ['Brasil', 'br'], '11': ['Portugal', 'pt']
    };
    const codigo = new URLSearchParams(window.location.search).get('equipo') || '5:1';
    const datos = equipos[codigo];
    const titulo = document.getElementById('titulo');
    const subtitulo = document.getElementById('subtitulo');
    const bandera = document.getElementById('bandera');
    if (datos) {
      titulo.textContent = `${codigo} · ${datos[0]}`;
      subtitulo.textContent = `Equipo representante de ${datos[0]}`;
      bandera.src = `https://flagcdn.com/w160/${datos[1]}.png`;
      bandera.alt = `Bandera de ${datos[0]}`;
    } else {
      const nombre = codigo === 'Voley' ? 'Voley' : 'Rugby';
      titulo.textContent = nombre;
      subtitulo.textContent = 'Equipo deportivo institucional';
      bandera.remove();
      const icono = document.createElement('div');
      icono.className = 'icono';
      icono.textContent = nombre === 'Voley' ? '🏐' : '🏉';
      document.querySelector('.perfil').prepend(icono);
    }
    if (codigo === '5:1') {
      document.getElementById('galeria-contenido').innerHTML = `
        <p class="nota">Momentos del equipo 5:1 Alemania.</p>
        <div class="galeria-fotos">
          <img src="alemania-5-1-01.jpg" alt="Equipo 5:1 Alemania en la jornada interclases">
          <img src="alemania-5-1-02.jpg" alt="Integrantes del equipo 5:1 Alemania">
          <img src="alemania-5-1-03.jpg" alt="Equipo 5:1 Alemania con sus banderas">
          <img src="alemania-5-1-04.jpg" alt="Equipo 5:1 Alemania con su cartel">
        </div>`;
    } else if (codigo === '5:2') {
      document.getElementById('galeria-contenido').innerHTML = `
        <p class="nota">Momentos del equipo 5:2 España.</p>
        <div class="galeria-fotos">
          <img src="espana-5-2-01.jpg" alt="Equipo 5:2 España en la jornada interclases">
          <img src="espana-5-2-02.jpg" alt="Integrantes del equipo 5:2 España con sus globos">
          <img src="espana-5-2-03.jpg" alt="Equipo 5:2 España celebrando">
          <img src="espana-5-2-04.jpg" alt="Celebración del equipo 5:2 España">
          <img src="espana-5-2-05.jpg" alt="Equipo 5:2 España con su bandera">
        </div>`;
    } else if (codigo === '5:3') {
      document.getElementById('galeria-contenido').innerHTML = `
        <p class="nota">Momentos del equipo 5:3 Países Bajos.</p>
        <div class="galeria-fotos">
          <img src="paises-bajos-5-3-01.jpg" alt="Equipo 5:3 Países Bajos con su cartel">
          <img src="paises-bajos-5-3-02.jpg" alt="Integrantes del equipo 5:3 Países Bajos">
          <img src="paises-bajos-5-3-03.jpg" alt="Equipo 5:3 Países Bajos con sus banderas">
        </div>`;
    } else if (codigo === '6:1') {
      const fotosColombia = Array.from({ length: 20 }, (_, indice) => {
        const numero = String(indice + 1).padStart(2, '0');
        return `<img src="colombia-6-1-${numero}.jpg" alt="Momento del equipo 6:1 Colombia">`;
      }).join('');
      document.getElementById('galeria-contenido').innerHTML = `
        <p class="nota">Momentos del equipo 6:1 Colombia.</p>
        <div class="galeria-fotos">${fotosColombia}</div>`;
    } else if (codigo === '6:2') {
      const fotosSenegal = Array.from({ length: 16 }, (_, indice) => {
        const numero = String(indice + 1).padStart(2, '0');
        return `<img src="senegal-6-2-${numero}.jpg" alt="Momento del equipo 6:2 Senegal">`;
      }).join('');
      document.getElementById('galeria-contenido').innerHTML = `
        <p class="nota">Momentos del equipo 6:2 Senegal.</p>
        <div class="galeria-fotos">${fotosSenegal}</div>`;
    } else if (codigo === '6:3') {
      document.getElementById('galeria-contenido').innerHTML = `
        <p class="nota">Momentos del equipo 6:3 Francia.</p>
        <div class="galeria-fotos">
          <img src="francia-6-3-01.jpg" alt="Equipo 6:3 Francia en la jornada interclases">
          <img src="francia-6-3-02.jpg" alt="Equipo 6:3 Francia con su cartel">
          <img src="francia-6-3-03.jpg" alt="Equipo 6:3 Francia celebrando">
          <img src="francia-6-3-04.jpg" alt="Integrantes del equipo 6:3 Francia">
        </div>`;
    }
    const fotos = [...document.querySelectorAll('.galeria-fotos img')];
    const visor = document.getElementById('visor');
    const fotoAmpliada = document.getElementById('foto-ampliada');
    let fotoActual = 0;
    const mostrarFoto = (indice) => {
      fotoActual = (indice + fotos.length) % fotos.length;
      fotoAmpliada.src = fotos[fotoActual].src;
      fotoAmpliada.alt = fotos[fotoActual].alt;
    };
    fotos.forEach((foto, indice) => foto.addEventListener('click', () => { mostrarFoto(indice); visor.classList.add('activo'); }));
    const cerrarVisor = () => visor.classList.remove('activo');
    document.getElementById('cerrar-visor').addEventListener('click', cerrarVisor);
    document.getElementById('foto-anterior').addEventListener('click', () => mostrarFoto(fotoActual - 1));
    document.getElementById('foto-siguiente').addEventListener('click', () => mostrarFoto(fotoActual + 1));
    visor.addEventListener('click', (evento) => { if (evento.target === visor) cerrarVisor(); });
    document.addEventListener('keydown', (evento) => {
      if (!visor.classList.contains('activo')) return;
      if (evento.key === 'Escape') cerrarVisor();
      if (evento.key === 'ArrowLeft') mostrarFoto(fotoActual - 1);
      if (evento.key === 'ArrowRight') mostrarFoto(fotoActual + 1);
    });
  </script>
</body>
</html>
